<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roblox Web Clone Beta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #111111;
            --sidebar-color: #191919;
            --topbar-color: #252525;
            --text-main: #ffffff;
            --text-sub: #b8b8b8;
            --accent: #00b0ff;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        /* 전체 레이아웃 */
        .app-container { display: flex; width: 100%; height: 100%; }

        /* 1. 좌측 사이드바 */
        .sidebar {
            width: 180px; height: 100%; background: var(--sidebar-color);
            display: flex; flex-direction: column; padding: 20px 10px; border-right: 1px solid #333;
        }
        .sidebar-item {
            padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 8px;
            font-size: 14px; display: flex; align-items: center; color: var(--text-sub);
        }
        .sidebar-item:hover { background: #333; color: white; }
        .sidebar-item.active { background: #333; color: white; font-weight: bold; }

        /* 2. 상단 바 */
        .top-nav {
            position: absolute; top: 0; left: 180px; right: 0; height: 60px;
            background: var(--topbar-color); display: flex; align-items: center;
            padding: 0 20px; z-index: 100;
        }
        .search-bar {
            background: #333; border: 1px solid #444; color: white;
            padding: 8px 15px; border-radius: 5px; width: 300px; margin-left: 20px;
        }

        /* 3. 메인 콘텐츠 (홈) */
        .main-content {
            flex: 1; margin-top: 60px; padding: 30px; overflow-y: auto;
            display: block; /* 기본적으로 보임 */
        }
        .section-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        
        /* 인맥(친구) 섹션 */
        .friends-list { display: flex; gap: 20px; margin-bottom: 40px; }
        .friend-circle { text-align: center; cursor: pointer; }
        .friend-img { width: 70px; height: 70px; background: #333; border-radius: 50%; margin-bottom: 8px; border: 2px solid #555; }

        /* 게임 리스트 */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card {
            background: #252525; border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s; border: 1px solid #333;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-card-img { width: 100%; height: 120px; background: linear-gradient(45deg, #444, #222); }
        .game-card-info { padding: 12px; }
        .game-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .game-desc { font-size: 12px; color: var(--text-sub); }

        /* 4. 게임 화면 (숨겨져 있음) */
        #game-view { display: none; width: 100%; height: 100%; position: relative; }
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 300px; height: 180px;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column; border-radius: 5px;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input { background: rgba(255,255,255,0.1); border: none; padding: 10px; color: white; outline: none; }

        /* 뒤로가기 버튼 */
        .exit-btn { position: absolute; top: 20px; right: 20px; background: red; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container" id="app-ui">
        <!-- 사이드바 -->
        <div class="sidebar">
            <div style="font-size: 20px; font-weight: bold; margin-bottom: 30px; color: #fff;">ROBLOX</div>
            <div class="sidebar-item active">🏠 홈</div>
            <div class="sidebar-item">👤 프로필</div>
            <div class="sidebar-item">✉️ 메시지</div>
            <div class="sidebar-item">아바타</div>
            <div class="sidebar-item">인벤토리</div>
            <div class="sidebar-item">만들기</div>
        </div>

        <!-- 상단 내비게이션 -->
        <div class="top-nav">
            <div style="font-weight: bold; cursor: pointer;">Home</div>
            <div style="margin-left: 20px; color: #ccc;">차트</div>
            <div style="margin-left: 20px; color: #ccc;">마켓플레이스</div>
            <input type="text" class="search-bar" placeholder="검색">
            <div style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
                🔔 💬 💰 803 ⚙️
            </div>
        </div>

        <!-- 메인 홈 콘텐츠 -->
        <div class="main-content" id="home-view">
            <div class="section-title">홈</div>
            
            <div style="font-size: 18px; margin-bottom: 15px;">인맥 (3)</div>
            <div class="friends-list">
                <div class="friend-circle"><div class="friend-img"></div><div>shark</div></div>
                <div class="friend-circle"><div class="friend-img"></div><div>smug_kat</div></div>
                <div class="friend-circle"><div class="friend-img"></div><div>bigmanpoo</div></div>
            </div>

            <div class="section-title">주목할 게임: 나만의 세계 건설</div>
            <div class="game-grid">
                <!-- 게임 클릭 시 게임 시작 -->
                <div class="game-card" onclick="launchGame('드라이빙 엠파이어')">
                    <div class="game-card-img" style="background: url('https://via.placeholder.com/200x120/1a1a1a/00b0ff?text=Driving+Empire') center/cover;"></div>
                    <div class="game-card-info">
                        <div class="game-title">드라이빙 엠파이어</div>
                        <div class="game-desc">더 빠르게 질주하세요</div>
                    </div>
                </div>
                <div class="game-card" onclick="launchGame('드래곤 어드벤처')">
                    <div class="game-card-img" style="background: url('https://via.placeholder.com/200x120/1a1a1a/ff9100?text=Dragon+Adventure') center/cover;"></div>
                    <div class="game-card-info">
                        <div class="game-title">드래곤 어드벤처</div>
                        <div class="game-desc">나만의 용을 길들이세요</div>
                    </div>
                </div>
                <div class="game-card" onclick="launchGame('세계 // 제로')">
                    <div class="game-card-img" style="background: url('https://via.placeholder.com/200x120/1a1a1a/9c27b0?text=World+Zero') center/cover;"></div>
                    <div class="game-card-info">
                        <div class="game-title">세계 // 제로</div>
                        <div class="game-desc">끝없는 모험</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 실제 3D 게임 창 -->
    <div id="game-view">
        <div class="exit-btn" onclick="exitGame()">나가기</div>
        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
        </div>
    </div>

    <script>
        let scene, camera, renderer, player;
        let isRightMouseDown = false;
        let cameraAngleX = 0, cameraAngleY = 0.5, cameraDistance = 10;
        const keys = {};

        // 1. 게임 실행 함수
        function launchGame(title) {
            document.getElementById('app-ui').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            init3D();
        }

        // 2. 게임 종료 (홈으로)
        function exitGame() {
            location.reload(); // 간단하게 초기화
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-view').appendChild(renderer.domElement);

            // 환경 구성
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x3a7d2c}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            scene.add(new THREE.AmbientLight(0x606060), new THREE.DirectionalLight(0xffffff, 1));

            // 캐릭터
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), new THREE.MeshStandardMaterial({color: 0x00b0ff}));
            body.position.y = 1.1;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.0;
            player.add(body, head);
            scene.add(player);

            // 이벤트 설정
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
            window.addEventListener('mouseup', (e) => { if(e.button === 2) isRightMouseDown = false; });
            window.addEventListener('mousemove', (e) => {
                if (isRightMouseDown) {
                    cameraAngleX -= e.movementX * 0.005;
                    cameraAngleY += e.movementY * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2.1, cameraAngleY));
                }
            });

            animate();
        }

        function isChatting() { return document.activeElement === document.getElementById('chat-input'); }

        function animate() {
            requestAnimationFrame(animate);

            if (!isChatting()) {
                const moveSpeed = 0.15;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX));
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX));

                if (keys['KeyW']) player.position.add(forward.multiplyScalar(moveSpeed));
                if (keys['KeyS']) player.position.sub(forward.multiplyScalar(moveSpeed));
                if (keys['KeyA']) player.position.sub(right.multiplyScalar(moveSpeed));
                if (keys['KeyD']) player.position.add(right.multiplyScalar(moveSpeed));
            }

            const offsetX = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const offsetY = Math.sin(cameraAngleY) * cameraDistance;
            const offsetZ = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;

            camera.position.set(player.position.x + offsetX, player.position.y + offsetY, player.position.z + offsetZ);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            renderer.render(scene, camera);
        }

        // 채팅 로직
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (chatInput.value) {
                    const div = document.createElement('div');
                    div.innerHTML = `<b>나:</b> ${chatInput.value}`;
                    document.getElementById('chat-messages').appendChild(div);
                    chatInput.value = "";
                }
                chatInput.blur();
            }
        });
        window.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !isChatting()) chatInput.focus(); });

    </script>
</body>
</html>
