<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Roblox Clone</title>
    <style>
        /* 기본 스타일 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: white;
            overflow: hidden;
        }

        .screen {
            display: none; /* 기본적으로 모든 화면은 숨김 */
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .active {
            display: flex; /* 현재 활성화된 화면만 보여줌 */
        }

        /* 1. 로그인 화면 스타일 */
        #login-screen {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #00b0ff;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        button:hover { background-color: #0081cb; }

        /* 2. 메인 홈 화면 스타일 */
        #home-screen {
            background-color: #181818;
        }
        .navbar {
            width: 100%;
            height: 60px;
            background-color: #252525;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
        }
        .game-card {
            width: 200px;
            height: 250px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:hover { transform: scale(1.05); }
        .game-card img { width: 100%; height: 150px; background-color: #555; }
        .game-info { padding: 10px; }

        /* 3. 게임 창 화면 스타일 */
        #game-screen {
            background-color: #000;
            position: relative;
        }
        #game-canvas {
            border: 2px solid #555;
            background-color: #222;
        }
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            background-color: red;
        }
    </style>
</head>
<body>

    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h1>ROBLOX CLONE</h1>
            <input type="text" id="username" placeholder="사용자 이름">
            <input type="password" placeholder="비밀번호">
            <button onclick="goToHome()">로그인</button>
        </div>
    </div>

    <!-- 2. 메인 홈 화면 -->
    <div id="home-screen" class="screen">
        <div class="navbar">
            <h2>Roblox Home</h2>
            <div style="margin-left: auto;" id="user-display"></div>
        </div>
        <div style="margin-top: 80px;">
            <h3>추천 게임</h3>
            <div class="game-card" onclick="goToGame()">
                <img src="https://via.placeholder.com/200x150?text=My+Game" alt="Game">
                <div class="game-info">
                    <h4>모험의 세계</h4>
                    <p>플레이 클릭!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 게임 창 화면 -->
    <div id="game-screen" class="screen">
        <button class="back-btn" onclick="goToHome()">나가기</button>
        <div class="game-ui">
            <h3>플레이 중: 모험의 세계</h3>
            <p>방향키(WASD)로 움직이세요</p>
        </div>
        <canvas id="game-canvas" width="800" height="500"></canvas>
    </div>

    <script>
        // 화면 전환 로직
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goToHome() {
            const user = document.getElementById('username').value || "Guest";
            document.getElementById('user-display').innerText = user + "님 환영합니다";
            showScreen('home-screen');
            stopGame(); // 홈으로 오면 게임 중지
        }

        function goToGame() {
            showScreen('game-screen');
            startGame(); // 게임 화면으로 가면 게임 시작
        }

        // 간단한 2D 게임 로직
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 400, y: 250, size: 30, color: '#00ff00', speed: 5 };
        let keys = {};
        let gameInterval;

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame() {
            gameInterval = setInterval(update, 1000/60); // 60fps
        }

        function stopGame() {
            clearInterval(gameInterval);
        }

        function update() {
            // 움직임 처리
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // 캔버스 경계 제한
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            draw();
        }

        function draw() {
            // 배경 그리기
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 그리드(바닥) 그리기
            ctx.strokeStyle = "#333";
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 플레이어 그리기 (로블록스 아바타 대용 사각형)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // 이름표
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText("Player", player.x, player.y - 5);
        }
    </script>
</body>
</html>
