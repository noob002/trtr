<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Roblox Clone - Professional Controls</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Arial', sans-serif; overflow: hidden; background: #1a1a1a; color: white; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active { display: flex; }

        /* 홈 화면 */
        #home-screen { background: radial-gradient(circle, #2c3e50, #000); }
        .btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; border: none; border-radius: 5px; background: #00b0ff; color: white; transition: 0.2s; }
        .btn:hover { background: #0081cb; transform: scale(1.05); }

        /* 채팅 UI */
        #chat-container { 
            position: absolute; bottom: 20px; left: 20px; width: 350px; height: 200px; 
            background: rgba(0,0,0,0.6); display: none; flex-direction: column; 
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); pointer-events: all;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; color: #eee; }
        #chat-input { background: rgba(255,255,255,0.1); border: none; padding: 12px; color: white; outline: none; border-top: 1px solid rgba(255,255,255,0.2); }

        #game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; font-weight: bold; text-shadow: 2px 2px 4px black; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- 우클릭 메뉴 방지 -->

    <!-- 홈 화면 -->
    <div id="home-screen" class="screen active">
        <h1>ROBLOX WEB CLONE</h1>
        <button class="btn" onclick="startGame()">게임 플레이</button>
        <p style="font-size: 14px; color: #aaa;">조작: WASD 이동 / 우클릭 드래그: 카메라 회전 / Enter: 채팅</p>
    </div>

    <!-- 게임 화면 레이어 -->
    <div id="game-ui" style="display:none;">
        <div>플레이 중...</div>
        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
        </div>
    </div>

    <script>
        let scene, camera, renderer, player;
        let isGameRunning = false;
        const keys = {};

        // 카메라 회전 관련 변수
        let isRightMouseDown = false;
        let cameraAngleX = 0; // 좌우 회전
        let cameraAngleY = 0.5; // 상하 회전
        const cameraDistance = 10;

        function startGame() {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('chat-container').style.display = 'flex';
            
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 바닥 및 환경
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x3a7d2c}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const grid = new THREE.GridHelper(200, 100, 0x000000, 0x444444);
            grid.position.y = 0.01;
            scene.add(grid);

            // 나무 장식
            for(let i=0; i<30; i++) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({color: 0x8b4513}));
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 8), new THREE.MeshStandardMaterial({color: 0x228b22}));
                leaves.position.y = 1.5;
                const tree = new THREE.Group();
                tree.add(trunk, leaves);
                tree.position.set(Math.random()*80-40, 0.5, Math.random()*80-40);
                scene.add(tree);
            }

            // 캐릭터 생성 (로블록스 스타일)
            player = createPlayer();
            scene.add(player);

            // 조명
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light, new THREE.AmbientLight(0x606060));

            // 이벤트 리스너
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            
            // 마우스 우클릭 회전 이벤트
            window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
            window.addEventListener('mouseup', (e) => { if(e.button === 2) isRightMouseDown = false; });
            window.addEventListener('mousemove', (e) => {
                if (isRightMouseDown) {
                    cameraAngleX -= e.movementX * 0.005; // 마우스 이동량에 따라 회전
                    cameraAngleY += e.movementY * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2.1, cameraAngleY)); // 바닥 아래로 못 내려가게 제한
                }
            });

            animate();
        }

        function createPlayer() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0xffdbac}); // 피부색
            const clothes = new THREE.MeshStandardMaterial({color: 0x00b0ff}); // 옷색

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), clothes);
            body.position.y = 1.1;
            
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), mat);
            head.position.y = 2.0;

            group.add(body, head);
            return group;
        }

        // 채팅창 포커스 확인 함수
        function isChatting() {
            return document.activeElement === document.getElementById('chat-input');
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. 이동 로직 (채팅 중이 아닐 때만 작동)
            if (!isChatting()) {
                const moveSpeed = 0.15;
                // 카메라 방향에 맞춰 이동하기 위해 계산
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX));
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX));

                if (keys['KeyW']) player.position.add(forward.multiplyScalar(moveSpeed));
                if (keys['KeyS']) player.position.sub(forward.multiplyScalar(moveSpeed));
                if (keys['KeyA']) player.position.sub(right.multiplyScalar(moveSpeed));
                if (keys['KeyD']) player.position.add(right.multiplyScalar(moveSpeed));
            }

            // 2. 카메라 위치 업데이트 (캐릭터 주위를 회전)
            const offsetX = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const offsetY = Math.sin(cameraAngleY) * cameraDistance;
            const offsetZ = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;

            camera.position.set(
                player.position.x + offsetX,
                player.position.y + offsetY,
                player.position.z + offsetZ
            );
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }

        // 채팅 입력 처리
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (chatInput.value.trim() !== "") {
                    const msg = document.createElement('div');
                    msg.innerHTML = `<b>나:</b> ${chatInput.value}`;
                    document.getElementById('chat-messages').appendChild(msg);
                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                    chatInput.value = "";
                }
                chatInput.blur(); // 엔터 치면 포커스 해제 (다시 움직일 수 있게 함)
            }
        });

        // 엔터 키로 채팅창 바로 포커스
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isChatting()) {
                chatInput.focus();
            }
        });
    </script>
</body>
</html>
