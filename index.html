<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My 3D Online World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { pointer-events: all; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; }
        .active { display: flex; }
        input, button { margin: 10px; padding: 10px; font-size: 1.2rem; }
        #game-info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="screen active">
        <h1>ROBLOX CLONE 3D</h1>
        <input type="text" id="nickname" placeholder="닉네임 입력">
        <button onclick="joinGame()">게임 시작</button>
    </div>

    <!-- 2. 게임 화면 UI -->
    <div id="ui-layer">
        <div id="game-info" style="display:none;">
            <p>접속 중: <span id="display-name"></span></p>
            <p>WASD로 이동 / 다른 플레이어를 찾아보세요!</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer, socket;
        let myId, playerMesh;
        let otherPlayers = {}; // 다른 플레이어들을 저장할 객체
        const moveSpeed = 0.2;
        const keys = {};

        // 화면 전환 및 게임 참가
        function joinGame() {
            const name = document.getElementById('nickname').value;
            if(!name) return alert("닉네임을 써주세요!");
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('game-info').style.display = 'block';

            init3D(); // 3D 세계 생성
            initMultiplayer(name); // 서버 연결
        }

        // 3D 세계 초기화 (Three.js)
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 하늘색

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 바닥 (격자무늬)
            const grid = new THREE.GridHelper(100, 50);
            scene.add(grid);

            // 조명
            const light = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(light);
            const dLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dLight.position.set(10, 20, 10);
            scene.add(dLight);

            // 내 캐릭터 (큐브)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            playerMesh = new THREE.Mesh(geometry, material);
            scene.add(playerMesh);

            camera.position.set(0, 5, 10);
            camera.lookAt(playerMesh.position);

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            animate();
        }

        // 멀티플레이어 연결 (Socket.io)
        function initMultiplayer(name) {
            // 주의: 실제 서버 주소로 바꿔야 함 (예: https://my-game-server.onrender.com)
            socket = io("http://localhost:3000"); 

            socket.emit('newPlayer', { name: name, x: 0, z: 0 });

            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach(id => {
                    if (id !== socket.id) addOtherPlayer(id, players[id]);
                });
            });

            socket.on('newPlayerJoined', (data) => {
                addOtherPlayer(data.id, data);
            });

            socket.on('playerMoved', (data) => {
                if (otherPlayers[data.id]) {
                    otherPlayers[data.id].position.set(data.x, 0.5, data.z);
                }
            });

            socket.on('playerDisconnected', (id) => {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            });
        }

        function addOtherPlayer(id, data) {
            const geom = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // 다른 사람은 빨간색
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(data.x, 0.5, data.z);
            scene.add(mesh);
            otherPlayers[id] = mesh;
        }

        function animate() {
            requestAnimationFrame(animate);

            // 이동 로직
            let moved = false;
            if (keys['KeyW']) { playerMesh.position.z -= moveSpeed; moved = true; }
            if (keys['KeyS']) { playerMesh.position.z += moveSpeed; moved = true; }
            if (keys['KeyA']) { playerMesh.position.x -= moveSpeed; moved = true; }
            if (keys['KeyD']) { playerMesh.position.x += moveSpeed; moved = true; }

            if (moved && socket) {
                // 서버에 내 위치 전송
                socket.emit('move', { x: playerMesh.position.x, z: playerMesh.position.z });
            }

            // 카메라가 캐릭터를 따라가게 함
            camera.position.x = playerMesh.position.x;
            camera.position.z = playerMesh.position.z + 10;
            camera.lookAt(playerMesh.position);

            renderer.render(scene, camera);
        // Firebase SDK 추가 (Head 태그 내)
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore.js";

// Firebase 설정 (본인의 Firebase 콘솔에서 복사)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "login.firebaseapp.com",
  projectId: "login-e6b02",
  // ...
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 유저 데이터 저장 예시
async function saveUserData(uid, name) {
  await setDoc(doc(db, "users", uid), {
    nickname: name,
    lastLogin: new Date()
  });
}
        
        }
    </script>
</body>
</html>
