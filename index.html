<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Block World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #111; --sidebar-color: #191919; --topbar-color: #252525;
            --text-main: #fff; --text-sub: #b8b8b8; --accent: #00b0ff;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        
        /* 로비 UI 레이아웃 */
        .app-container { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 180px; background: var(--sidebar-color); padding: 20px 10px; border-right: 1px solid #333; z-index: 10; }
        .sidebar-item { padding: 12px; cursor: pointer; border-radius: 8px; color: var(--text-sub); margin-bottom: 5px; }
        .sidebar-item:hover, .sidebar-item.active { background: #333; color: white; }

        .top-nav { position: absolute; top: 0; left: 180px; right: 0; height: 60px; background: var(--topbar-color); display: flex; align-items: center; padding: 0 20px; z-index: 5; }
        .nav-btn { margin-right: 20px; cursor: pointer; color: var(--text-sub); font-weight: bold; }
        .nav-btn.active { color: white; border-bottom: 2px solid white; }

        .main-view { flex: 1; margin-top: 60px; padding: 30px; overflow-y: auto; display: none; }
        .view-active { display: block; }

        /* 친구 섹션 */
        .friends-container { display: flex; gap: 15px; min-height: 80px; align-items: center; color: #666; font-style: italic; }

        /* 게임 카드 */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .game-card { background: #252525; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .game-card:hover { border-color: var(--accent); }

        /* 아바타 상점 */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .shop-item { background: #333; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; }
        .shop-item:hover { background: #444; border: 1px solid var(--accent); }

        /* 게임 실행 레이어 */
        #game-view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 100; }
        
        /* ESC 메뉴 팝업 */
        #esc-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .menu-box { background: #252525; padding: 40px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .menu-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .resume-btn { background: var(--accent); color: white; }
        .leave-btn { background: #555; color: white; }

        #chat-ui { position: absolute; bottom: 20px; left: 20px; width: 320px; background: rgba(0,0,0,0.6); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 로비 UI -->
    <div class="app-container" id="lobby-ui">
        <div class="sidebar">
            <div style="font-size: 22px; font-weight: bold; margin-bottom: 30px; letter-spacing: -1px;">Block world</div>
            <div class="sidebar-item active" onclick="showView('home-view')">🏠 홈</div>
            <div class="sidebar-item" onclick="showView('shop-view')">👕 아바타</div>
            <div class="sidebar-item">🎒 인벤토리</div>
        </div>

        <div class="top-nav">
            <div class="nav-btn active" id="nav-home" onclick="showView('home-view')">Home</div>
            <div class="nav-btn" id="nav-shop" onclick="showView('shop-view')">마켓플레이스</div>
            <div style="margin-left: auto; font-weight: bold;">💰 803 ⚙️</div>
        </div>

        <!-- 홈 화면 -->
        <div id="home-view" class="main-view view-active">
            <h2 style="margin-top:0;">친구</h2>
            <div class="friends-container" id="friends-list">
                등록된 친구가 없습니다.
            </div>

            <h2 style="margin-top:40px;">추천 게임</h2>
            <div class="game-grid">
                <div class="game-card" onclick="launchGame()">
                    <div style="height:120px; background: linear-gradient(45deg, #111, #333); display:flex; align-items:center; justify-content:center; font-size:40px;">🎮</div>
                    <div style="padding: 15px;"><b>오픈 월드 베타</b><br><span style="font-size:12px; color:#aaa;">지금 플레이 하세요</span></div>
                </div>
            </div>
        </div>

        <!-- 마켓플레이스 (상점) -->
        <div id="shop-view" class="main-view">
            <h2>마켓플레이스 (아바타 상점)</h2>
            <div class="shop-grid">
                <div class="shop-item">빨간 셔츠</div>
                <div class="shop-item">파란 바지</div>
                <div class="shop-item">멋진 모자</div>
                <div class="shop-item">검정 안경</div>
            </div>
        </div>
    </div>

    <!-- 3D 게임 화면 -->
    <div id="game-view">
        <div id="esc-menu">
            <div class="menu-box">
                <h2 style="margin-top:0; color:white;">설정</h2>
                <button class="menu-btn resume-btn" onclick="toggleEscMenu()">게임으로 돌아가기</button>
                <button class="menu-btn leave-btn" onclick="exitGame()">나가기</button>
            </div>
        </div>
        <div id="chat-ui">
            <div id="chat-msgs" style="height:160px; overflow-y:auto; padding:12px; font-size:14px; line-height:1.5;"></div>
            <input type="text" id="chat-input" placeholder="채팅하려면 Enter..." style="width:100%; background:rgba(255,255,255,0.05); border:none; border-top:1px solid #444; color:white; padding:12px; box-sizing:border-box; outline:none;">
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, clock;
        let limbs = {};
        let isRightMouseDown = false, cameraAngleX = 0, cameraAngleY = 0.6, cameraDistance = 14;
        const keys = {};

        // 물리 및 이동 변수
        let pyVelocity = 0, isJumping = false;
        const gravity = 0.018, jumpPower = 0.38, moveSpeed = 0.18;

        function showView(id) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'home-view') document.getElementById('nav-home').classList.add('active');
            if(id === 'shop-view') document.getElementById('nav-shop').classList.add('active');
        }

        function launchGame() {
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            if(!scene) init3D();
        }

        function toggleEscMenu() {
            const menu = document.getElementById('esc-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function exitGame() { location.reload(); }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-view').appendChild(renderer.domElement);

            // 환경 (바닥)
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);
            scene.add(new THREE.AmbientLight(0x909090), new THREE.DirectionalLight(0xffffff, 0.8));

            // 캐릭터 제작
            player = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({color: 0xffdbac});
            const shirtMat = new THREE.MeshStandardMaterial({color: 0x00b0ff});

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), shirtMat); body.position.y = 1.1; player.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skinMat); head.position.y = 2.0; player.add(head);

            const armGeom = new THREE.BoxGeometry(0.4, 1, 0.4);
            limbs.lArm = new THREE.Mesh(armGeom, skinMat); limbs.lArm.position.set(-0.7, 1.1, 0); player.add(limbs.lArm);
            limbs.rArm = new THREE.Mesh(armGeom, skinMat); limbs.rArm.position.set(0.7, 1.1, 0); player.add(limbs.rArm);

            const legGeom = new THREE.BoxGeometry(0.45, 1, 0.45);
            limbs.lLeg = new THREE.Mesh(legGeom, skinMat); limbs.lLeg.position.set(-0.25, 0.5, 0); player.add(limbs.lLeg);
            limbs.rLeg = new THREE.Mesh(legGeom, skinMat); limbs.rLeg.position.set(0.25, 0.5, 0); player.add(limbs.rLeg);

            scene.add(player);

            // 입력 리스너
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if(e.code === 'Escape') toggleEscMenu();
                if(e.code === 'Space' && !isJumping && !isChatting()) { pyVelocity = jumpPower; isJumping = true; }
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
            window.addEventListener('mouseup', () => isRightMouseDown = false);
            window.addEventListener('mousemove', (e) => {
                if(isRightMouseDown) {
                    cameraAngleX -= e.movementX * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(1.4, cameraAngleY + e.movementY * 0.005));
                }
            });

            animate();
        }

        function isChatting() { return document.activeElement === document.getElementById('chat-input'); }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const menuOpen = document.getElementById('esc-menu').style.display === 'flex';

            if (!isChatting() && !menuOpen) {
                // 1. 이동 방향 계산
                let moveVector = new THREE.Vector3(0, 0, 0);
                if(keys['KeyW']) moveVector.z -= 1;
                if(keys['KeyS']) moveVector.z += 1;
                if(keys['KeyA']) moveVector.x -= 1;
                if(keys['KeyD']) moveVector.x += 1;

                if (moveVector.length() > 0) {
                    moveVector.normalize();
                    // 카메라 회전값(cameraAngleX)에 맞춰 이동 방향 틀기
                    moveVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX);
                    
                    // 캐릭터 이동
                    player.position.add(moveVector.clone().multiplyScalar(moveSpeed));

                    // 캐릭터가 이동 방향을 바라보게 회전 (중요!)
                    const targetRotation = Math.atan2(moveVector.x, moveVector.z);
                    player.rotation.y = targetRotation;

                    // 걷기 애니메이션
                    if(!isJumping) {
                        const walkCycle = Math.sin(time * 12) * 0.6;
                        limbs.lLeg.rotation.x = walkCycle;
                        limbs.rLeg.rotation.x = -walkCycle;
                        limbs.lArm.rotation.x = -walkCycle;
                        limbs.rArm.rotation.x = walkCycle;
                    }
                } else {
                    // 멈췄을 때 팔다리 리셋
                    limbs.lLeg.rotation.x = limbs.rLeg.rotation.x = 0;
                    limbs.lArm.rotation.x = limbs.rArm.rotation.x = 0;
                }

                // 점프 및 중력
                player.position.y += pyVelocity;
                if(player.position.y > 0) {
                    pyVelocity -= gravity;
                } else {
                    player.position.y = 0; pyVelocity = 0; isJumping = false;
                }
            }

            // 카메라 위치 업데이트
            const ox = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const oy = Math.sin(cameraAngleY) * cameraDistance;
            const oz = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            camera.position.set(player.position.x + ox, player.position.y + oy, player.position.z + oz);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }

        // 채팅 입력
        const ci = document.getElementById('chat-input');
        ci.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && ci.value) {
                const m = document.createElement('div');
                m.innerHTML = `<span style="color:#aaa;">나:</span> ${ci.value}`;
                document.getElementById('chat-msgs').appendChild(m);
                document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
                ci.value = ""; ci.blur();
            }
        });
    </script>
</body>
</html>
