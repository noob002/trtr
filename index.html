<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Block World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #111; --side: #191919; --top: #252525; --accent: #00b0ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* UI 레이아웃 */
        .app-container { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 180px; background: var(--side); padding: 20px 10px; border-right: 1px solid #333; z-index: 10; }
        .sidebar-item { padding: 12px; cursor: pointer; border-radius: 8px; color: #b8b8b8; margin-bottom: 5px; }
        .sidebar-item:hover, .sidebar-item.active { background: #333; color: white; }

        .top-nav { position: absolute; top: 0; left: 180px; right: 0; height: 60px; background: var(--top); display: flex; align-items: center; padding: 0 20px; z-index: 5; }
        .nav-btn { margin-right: 20px; cursor: pointer; color: #b8b8b8; font-weight: bold; }
        .nav-btn.active { color: white; border-bottom: 2px solid white; }

        .main-view { flex: 1; margin-top: 60px; padding: 30px; overflow-y: auto; display: none; }
        .view-active { display: block; }

        /* 친구 및 게임 카드 */
        .friends-empty { color: #666; font-style: italic; padding: 20px 0; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: #252525; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; }

        /* 게임 화면 */
        #game-view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 100; }
        #esc-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .menu-box { background: #252525; padding: 40px; border-radius: 15px; text-align: center; width: 300px; }
        .menu-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lobby-ui" class="app-container">
        <div class="sidebar">
            <div style="font-size: 22px; font-weight: bold; margin-bottom: 30px;">Block World</div>
            <div class="sidebar-item active" onclick="showView('home-view')">🏠 홈</div>
            <div class="sidebar-item" onclick="showView('shop-view')">👕 아바타</div>
        </div>
        <div class="top-nav">
            <div class="nav-btn active" id="nav-home" onclick="showView('home-view')">Home</div>
            <div class="nav-btn" id="nav-shop" onclick="showView('shop-view')">마켓플레이스</div>
            <div style="margin-left: auto;">💰 803 ⚙️</div>
        </div>
        <div id="home-view" class="main-view view-active">
            <h2>친구</h2>
            <div class="friends-empty">아직 친구가 없습니다.</div>
            <h2>인기 게임</h2>
            <div class="game-grid">
                <div class="game-card" onclick="launchGame()">
                    <div style="height:120px; background: #00b0ff; display:flex; align-items:center; justify-content:center; font-size:40px;">🏃</div>
                    <div style="padding: 15px;"><b>이지 점프맵 (Obby)</b><br><span style="font-size:12px; color:#aaa;">끝까지 도달해보세요!</span></div>
                </div>
            </div>
        </div>
        <div id="shop-view" class="main-view">
            <h2>마켓플레이스</h2>
            <p>준비 중입니다...</p>
        </div>
    </div>

    <div id="game-view">
        <div id="esc-menu">
            <div class="menu-box">
                <h2>일시정지</h2>
                <button class="menu-btn" style="background:var(--accent); color:white;" onclick="toggleEscMenu()">계속하기</button>
                <button class="menu-btn" style="background:#555; color:white;" onclick="location.reload()">나가기</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, clock;
        let limbs = {}, platforms = [];
        let isRightMouseDown = false, cameraAngleX = 0, cameraAngleY = 0.6, cameraDistance = 15;
        const keys = {};

        // 물리 변수
        let pyVelocity = 0, isJumping = false;
        const gravity = 0.015, jumpPower = 0.35, moveSpeed = 0.15;
        let targetRotation = 0;

        function showView(id) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
        }

        function launchGame() {
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            init3D();
        }

        function toggleEscMenu() {
            const menu = document.getElementById('esc-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-view').appendChild(renderer.domElement);

            // 환경: 기본 시작 바닥
            createPlatform(0, -0.5, 0, 15, 1, 15, 0x4caf50);

            // 점프맵 발판들 (x, y, z, w, h, d, color)
            createPlatform(0, 1, -15, 5, 0.5, 5, 0xffeb3b);
            createPlatform(7, 2.5, -25, 5, 0.5, 5, 0xff9800);
            createPlatform(-7, 4, -35, 5, 0.5, 5, 0xff5722);
            createPlatform(0, 6, -50, 8, 0.5, 8, 0xe91e63);
            createPlatform(0, 7.5, -65, 4, 0.5, 4, 0x9c27b0);
            createPlatform(0, 9, -80, 10, 1, 10, 0x00ff00); // 목표 지점

            scene.add(new THREE.AmbientLight(0x909090), new THREE.DirectionalLight(0xffffff, 0.8));

            // 캐릭터 제작
            player = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({color: 0xffdbac});
            const shirtMat = new THREE.MeshStandardMaterial({color: 0x00b0ff});

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), shirtMat); body.position.y = 1.1; player.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skinMat); head.position.y = 2.0; player.add(head);

            limbs.lArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1, 0.4), skinMat); limbs.lArm.position.set(-0.7, 1.1, 0); player.add(limbs.lArm);
            limbs.rArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1, 0.4), skinMat); limbs.rArm.position.set(0.7, 1.1, 0); player.add(limbs.rArm);
            limbs.lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1, 0.45), skinMat); limbs.lLeg.position.set(-0.25, 0.5, 0); player.add(limbs.lLeg);
            limbs.rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1, 0.45), skinMat); limbs.rLeg.position.set(0.25, 0.5, 0); player.add(limbs.rLeg);

            scene.add(player);

            // 이벤트 핸들러
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if(e.code === 'Escape') toggleEscMenu();
                if(e.code === 'Space' && !isJumping) { pyVelocity = jumpPower; isJumping = true; }
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
            window.addEventListener('mouseup', () => isRightMouseDown = false);
            window.addEventListener('mousemove', (e) => {
                if(isRightMouseDown) {
                    cameraAngleX -= e.movementX * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(1.4, cameraAngleY + e.movementY * 0.005));
                }
            });

            animate();
        }

        function createPlatform(x, y, z, w, h, d, color) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: color}));
            mesh.position.set(x, y, z);
            scene.add(mesh);
            platforms.push({mesh: mesh, w: w, h: h, d: d});
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const menuOpen = document.getElementById('esc-menu').style.display === 'flex';

            if (!menuOpen) {
                let moveVector = new THREE.Vector3(0, 0, 0);
                if(keys['KeyW']) moveVector.z -= 1;
                if(keys['KeyS']) moveVector.z += 1;
                if(keys['KeyA']) moveVector.x -= 1;
                if(keys['KeyD']) moveVector.x += 1;

                if (moveVector.length() > 0) {
                    moveVector.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngleX);
                    player.position.add(moveVector.multiplyScalar(moveSpeed));
                    targetRotation = Math.atan2(moveVector.x, moveVector.z);
                    
                    // 1. 부드러운 회전 (Lerp)
                    let diff = targetRotation - player.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    player.rotation.y += diff * 0.15;

                    // 2. 걷기 애니메이션
                    if(!isJumping) {
                        const walkCycle = Math.sin(time * 12) * 0.6;
                        limbs.lLeg.rotation.x = walkCycle; limbs.rLeg.rotation.x = -walkCycle;
                        limbs.lArm.rotation.x = -walkCycle; limbs.rArm.rotation.x = walkCycle;
                        limbs.lArm.rotation.z = limbs.rArm.rotation.z = 0;
                    }
                } else if(!isJumping) {
                    // 정지 상태
                    limbs.lLeg.rotation.x = limbs.rLeg.rotation.x = 0;
                    limbs.lArm.rotation.x = limbs.rArm.rotation.x = 0;
                }

                // 3. 점프 모션 및 물리
                player.position.y += pyVelocity;
                pyVelocity -= gravity;

                if(isJumping) {
                    // 점프 포즈: 팔을 살짝 벌리고 다리를 오므림
                    limbs.lArm.rotation.z = 0.5; limbs.rArm.rotation.z = -0.5;
                    limbs.lLeg.rotation.x = -0.3; limbs.rLeg.rotation.x = -0.3;
                }

                // 4. 발판 충돌 감지 (간단한 AABB)
                let onGround = false;
                platforms.forEach(p => {
                    const px = player.position.x, py = player.position.y, pz = player.position.z;
                    const b = p.mesh.position;
                    if (px > b.x - p.w/2 && px < b.x + p.w/2 &&
                        pz > b.z - p.d/2 && pz < b.z + p.d/2 &&
                        py >= b.y + p.h/2 - 0.2 && py <= b.y + p.h/2 + 0.2 &&
                        pyVelocity <= 0) {
                        player.position.y = b.y + p.h/2;
                        pyVelocity = 0;
                        isJumping = false;
                        onGround = true;
                    }
                });

                // 맵 밖으로 추락 시 리스폰
                if (player.position.y < -10) {
                    player.position.set(0, 5, 0);
                    pyVelocity = 0;
                }
            }

            const ox = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            const oy = Math.sin(cameraAngleY) * cameraDistance;
            const oz = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            camera.position.set(player.position.x + ox, player.position.y + oy, player.position.z + oz);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
